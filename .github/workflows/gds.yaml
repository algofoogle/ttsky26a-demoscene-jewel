name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttsky26a
        with:
          pdk: sky130A

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttsky26a

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttsky26a
        env:
          FRAMES: 3 # Limit frames, so it doesn't take too long.

      - name: Install ImageMagick
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y imagemagick # ffmpeg

      - name: Convert output frames from PPMs to PNGs
        if: success() || failure() # Run this even if the step above fails.
        shell: bash
        run: |
          pwd
          ls -al
          cd test
          mkdir frames_out/png
          cd frames_out
          bash ../animate.sh png && cd png && tar czf ../frames-gl.tgz *.png

      - name: Convert output frames from PPMs to animated GIF
        if: success() || failure() # Run this even if the step above fails.
        shell: bash
        run: |
          pwd
          ls -al
          cd test
          cd frames_out
          bash ../animate.sh frames-gl.gif

      - name: Store frame output files
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: frames-gl
          path: |
            test/frames_out/frames-gl.tgz
            test/frames_out/frames-gl.gif

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttsky26a
