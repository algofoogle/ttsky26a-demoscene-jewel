name: test
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      # Set Python up and install cocotb
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Run tests
        run: |
          cd test
          make clean
          make
          # make will return success even if the test fails, so check for failure in the results.xml
          ! grep failure results.xml

      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results.xml"
        if: always()

      - name: Install ImageMagick
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y imagemagick # ffmpeg

      - name: Install Ubuntu-Mono font
        shell: bash
        run: sudo apt-get install -y mono-complete || true # Suppress errors; the font is not that important.

      - name: Convert output frames from PPMs to PNGs
        if: success() || failure() # Run this even if the step above fails.
        shell: bash
        run: |
          pwd
          ls -al
          cd test
          mkdir frames_out/png
          cd frames_out
          bash ../animate.sh png && cd png && tar czf ../frames-rtl.tgz *.png

      - name: Convert output frames from PPMs to animated GIF
        if: success() || failure() # Run this even if the step above fails.
        shell: bash
        run: |
          pwd
          ls -al
          cd test
          cd frames_out
          bash ../animate.sh frames-rtl.gif

      - name: Store frame output files
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: frames-rtl
          path: |
            test/frames_out/frames-rtl.tgz
            test/frames_out/frames-rtl.gif

      - name: upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*
